name: Build and Deploy Sprotan MCP

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: sprotanacr
  IMAGE_NAME: sprotan-mcp
  RESOURCE_GROUP: sprotan-rg
  # Storage account created by Terraform (sprotan + stor = sprotanstor)
  # To upload the DB initially:
  #   az storage blob upload --account-name sprotanstor --container-name data --name sprotin.db --file db/sprotin.db
  STORAGE_ACCOUNT: sprotanstor
  STORAGE_CONTAINER: data

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Download database from Azure Blob Storage
        run: |
          mkdir -p db
          ACCOUNT_KEY=$(az storage account keys list --account-name ${{ env.STORAGE_ACCOUNT }} --resource-group ${{ env.RESOURCE_GROUP }} --query "[0].value" -o tsv)
          az storage blob download \
            --account-name ${{ env.STORAGE_ACCOUNT }} \
            --container-name ${{ env.STORAGE_CONTAINER }} \
            --name sprotin.db \
            --file db/sprotin.db \
            --account-key "$ACCOUNT_KEY"

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                     ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Container Apps
        run: |
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"

          az containerapp update \
            --name sprotan-mcp \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image "$IMAGE"
