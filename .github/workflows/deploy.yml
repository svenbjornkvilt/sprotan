name: Build and Deploy Sprotan MCP

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: sprotanacr
  IMAGE_NAME: sprotan-mcp
  RESOURCE_GROUP: sprotan-rg
  CONTAINER_NAME: sprotan-mcp

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                     ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Container Instances
        run: |
          az container create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --registry-login-server ${{ env.ACR_NAME }}.azurecr.io \
            --registry-username $(az acr credential show --name ${{ env.ACR_NAME }} --query username -o tsv) \
            --registry-password $(az acr credential show --name ${{ env.ACR_NAME }} --query "passwords[0].value" -o tsv) \
            --ports 8080 \
            --cpu 1 \
            --memory 2 \
            --dns-name-label sprotan \
            --command-line "python3 mcp_server.py --transport http" \
            --os-type Linux
