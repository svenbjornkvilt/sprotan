name: Build and Deploy Sprotan MCP

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: sprotanacr
  IMAGE_NAME: sprotan-mcp
  RESOURCE_GROUP: sprotan-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                     ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Container Instances
        run: |
          ACR_SERVER="${{ env.ACR_NAME }}.azurecr.io"
          ACR_USERNAME=$(az acr credential show --name ${{ env.ACR_NAME }} --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show --name ${{ env.ACR_NAME }} --query "passwords[0].value" -o tsv)
          IMAGE="${ACR_SERVER}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

          # Fill in deployment template
          sed -e "s|__IMAGE__|${IMAGE}|g" \
              -e "s|__ACR_SERVER__|${ACR_SERVER}|g" \
              -e "s|__ACR_USERNAME__|${ACR_USERNAME}|g" \
              -e "s|__ACR_PASSWORD__|${ACR_PASSWORD}|g" \
              deploy/aci.yaml > /tmp/aci-deploy.yaml

          # Delete existing container group (ACI can't update multi-container groups in-place)
          az container delete --resource-group ${{ env.RESOURCE_GROUP }} --name sprotan-mcp --yes 2>/dev/null || true

          # Deploy with Caddy HTTPS sidecar
          az container create --resource-group ${{ env.RESOURCE_GROUP }} --file /tmp/aci-deploy.yaml
